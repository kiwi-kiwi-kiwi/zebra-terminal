<!DOCTYPE html>
<html>
<head>
  <title>Zebra USB Print Debug Terminal</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      background: #f4f6f9;
      color: #333;
    }

    .box {
      border: 2px dashed #6f42c1;
      padding: 30px;
      background: white;
      display: inline-block;
      border-radius: 8px;
      margin-top: 20px;
      width: 500px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background: #6f42c1;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }

    .log-box {
      margin-top: 20px;
      text-align: left;
      background: #111;
      color: #00ff88;
      font-family: monospace;
      padding: 12px;
      border-radius: 6px;
      height: 220px;
      overflow-y: auto;
      font-size: 12px;
    }

    .log-entry {
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Zebra USB Debug Terminal</h2>

  <button id="connectBtn">Connect USB Printer</button>

  <div id="status">Status: Idle</div>

  <div id="logBox" class="log-box"></div>
</div>

<script>

let zebraDevice = null;

const logBox = document.getElementById('logBox');

function log(msg) {
  const line = document.createElement('div');
  line.className = 'log-entry';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

/* -------------------------
   CONNECT
------------------------- */
document.getElementById('connectBtn').addEventListener('click', async () => {

  try {

    log("=== CONNECT START ===");

    // 1. Browser support check
    log("Checking WebUSB support...");

    if (!navigator.usb) {
      log("ERROR: WebUSB not supported in this browser");
      return;
    }

    log("WebUSB supported");

    // 2. OS info
    log("User agent: " + navigator.userAgent);

    // 3. Request device
    log("Requesting USB device (Zebra filter)...");

    zebraDevice = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0A5F }]
    });

    log("Device selected: " + (zebraDevice.productName || "Unknown"));

    // 4. Open device
    log("Opening device...");
    await zebraDevice.open();
    log("Device opened");

    // 5. Configuration check
    log("Current configuration: " + zebraDevice.configuration?.configurationValue);

    if (!zebraDevice.configuration) {
      log("Selecting configuration 1...");
      await zebraDevice.selectConfiguration(1);
      log("Configuration set");
    }

    // 6. Interface inspection
    log("Inspecting interfaces...");

    console.log("CONFIG:", zebraDevice.configuration);

    const interfaces = zebraDevice.configuration.interfaces;

    log("Interfaces found: " + interfaces.length);

    interfaces.forEach((iface, i) => {
      log(`Interface ${i}: #${iface.interfaceNumber}`);
    });

    // 7. Claim interface (TRY ALL if needed)
    const iface = interfaces[0];

    log("Trying to claim interface: " + iface.interfaceNumber);

    await zebraDevice.claimInterface(iface.interfaceNumber);

    log("Interface claimed successfully");

    // 8. Endpoint inspection
    const endpoints = iface.alternates[0].endpoints;

    log("Endpoints found: " + endpoints.length);

    endpoints.forEach((ep, i) => {
      log(`Endpoint ${i}: ${ep.endpointNumber} (${ep.direction})`);
    });

    const outEndpoint = endpoints.find(e => e.direction === "out");

    if (!outEndpoint) {
      log("ERROR: No OUT endpoint found");
      return;
    }

    log("Using OUT endpoint: " + outEndpoint.endpointNumber);

    // 9. Update status
    document.getElementById('status').innerText = "Connected (WebUSB)";
    log("=== CONNECT SUCCESS ===");

  } catch (err) {

    console.error(err);

    log("ERROR: " + err.name + " - " + err.message);
    log("=== CONNECT FAILED ===");

  }
});

/* -------------------------
   PRINT TEST
------------------------- */
async function sendTestPrint() {

  try {

    if (!zebraDevice) {
      log("No device connected");
      return;
    }

    const data = new TextEncoder().encode("^XA^FO50,50^FDTEST PRINT^FS^XZ");

    log("Sending test print...");

    const iface = zebraDevice.configuration.interfaces[0];
    const ep = iface.alternates[0].endpoints.find(e => e.direction === "out");

    await zebraDevice.transferOut(ep.endpointNumber, data);

    log("Print sent successfully");

  } catch (err) {
    log("PRINT ERROR: " + err.message);
  }
}

</script>

</body>
</html>
