<!DOCTYPE html>
<html>
<head>
  <title>Zebra USB Print Terminal</title>
  <style>
    body { font-family: sans-serif; padding: 30px; text-align: center; background: #f4f6f9; color: #333; }
    .box { border: 2px dashed #6f42c1; padding: 30px; background: white; display: inline-block; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 450px; }
    button { padding: 12px 24px; font-size: 16px; background: #6f42c1; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:active { background: #5a32a3; }
    #status { font-weight: bold; margin-top: 15px; color: #666; font-size: 14px; }

    .log-box { margin-top: 20px; text-align: left; background: #222; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 6px; height: 180px; overflow-y: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; font-size: 12px; }
  </style>
</head>

<body>

<div class="box">
  <h2>Zebra USB Print Terminal</h2>

  <p>Keep this tab open in the background to handle printing from your scanner app.</p>

  <button id="connectBtn">🔌 Connect Physical Zebra Printer</button>

  <p id="status">Status: Disconnected (Running in Simulation Mode 🖥️)</p>

  <h4 style="text-align: left; margin-bottom: 5px; color: #555;">Activity Log:</h4>

  <div id="logBox" class="log-box">
    <div class="log-entry" style="color: #888;">> System ready. Awaiting data from scanner app...</div>
  </div>
</div>

<script>

let zebraDevice = null;
let browserPrinter = null;

const logBox = document.getElementById('logBox');

function logToScreen(message, isAlert = false) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  if (isAlert) entry.style.color = '#ffcc00';

  const timestamp = new Date().toLocaleTimeString();
  entry.innerHTML = `[${timestamp}] ${message}`;

  logBox.appendChild(entry);
  logBox.scrollTop = logBox.scrollHeight;
}

/* =========================
   OS DETECTION
   ========================= */
const isWindows = navigator.userAgent.includes("Windows");
const isChromeOS = navigator.userAgent.includes("CrOS");

/* =========================
   CONNECT LOGIC (FIXED)
   ========================= */
document.getElementById('connectBtn').addEventListener('click', async () => {

  try {

    logToScreen("🔍 Detecting platform...");

    zebraDevice = null;
    browserPrinter = null;

    /* =========================
       WINDOWS → Browser Print
       ========================= */
    if (isWindows) {

      logToScreen("🪟 Windows detected → using Browser Print");

      if (window.BrowserPrint) {

        BrowserPrint.getDefaultDevice("printer", function(device) {

          if (!device) {
            logToScreen("❌ No Browser Print printer found", true);
            return;
          }

          browserPrinter = device;

          document.getElementById('status').innerText =
            "Status: Windows (Browser Print)";

          document.getElementById('status').style.color = "green";

          logToScreen("🖨️ Browser Print printer ready");

        }, function(err) {
          logToScreen("❌ Browser Print error: " + err, true);
        });

      } else {
        logToScreen("❌ Browser Print not installed", true);
      }

      return;
    }

    /* =========================
       CHROMEBOOK → WebUSB
       ========================= */
    if (isChromeOS || navigator.usb) {

      logToScreen("💻 ChromeOS/WebUSB mode");

      zebraDevice = await navigator.usb.requestDevice({
        filters: [{ vendorId: 0x0A5F }]
      });

      logToScreen("📦 Device selected: " + (zebraDevice.productName || "Zebra"));

      await zebraDevice.open();

      if (!zebraDevice.configuration) {
        await zebraDevice.selectConfiguration(1);
      }

      await zebraDevice.claimInterface(0);

      document.getElementById('status').innerText =
        "Status: WebUSB Connected";

      document.getElementById('status').style.color = "green";

      logToScreen("🔌 WebUSB connected successfully");

      return;
    }

    /* =========================
       FALLBACK
       ========================= */
    logToScreen("⚠️ No supported printing method found", true);

    document.getElementById('status').innerText =
      "Status: No printer method available";

    document.getElementById('status').style.color = "red";

  } catch (error) {

    console.error(error);

    logToScreen(
      "❌ Connection failed: " + (error.name + " - " + error.message),
      true
    );

    document.getElementById('status').innerText =
      "Status: Connection failed";

    document.getElementById('status').style.color = "red";

    zebraDevice = null;
  }
});

/* =========================
   PRINT HANDLER
   ========================= */
window.addEventListener('message', async (event) => {

  if (!event.data || event.data.type !== 'ZEBRA_PRINT_JOB') return;

  logToScreen("📩 Print job received: " + event.data.tag);

  try {

    /* WINDOWS (Browser Print) */
    if (browserPrinter) {

      browserPrinter.send(event.data.zpl, function() {

        logToScreen("🖨️ Windows print success via Browser Print");

        event.source.postMessage({
          type: "PRINT_SUCCESS",
          tag: event.data.tag
        }, event.origin);

      }, function(err) {
        logToScreen("❌ Browser Print error: " + err, true);
      });

      return;
    }

    /* CHROMEBOOK (WebUSB) */
    if (zebraDevice) {

      const data = new TextEncoder().encode(event.data.zpl);

      await zebraDevice.transferOut(1, data);

      logToScreen("🖨️ WebUSB print success");

      event.source.postMessage({
        type: "PRINT_SUCCESS",
        tag: event.data.tag
      }, event.origin);

      return;
    }

    /* SIMULATION */
    logToScreen("🖥️ Simulated print (no printer)");

    event.source.postMessage({
      type: "PRINT_SUCCESS",
      tag: event.data.tag + " (Simulated)"
    }, event.origin);

  } catch (err) {

    logToScreen("❌ Print error: " + err.message, true);

    event.source.postMessage({
      type: "PRINT_ERROR",
      error: err.message
    }, event.origin);
  }
});

</script>

</body>
</html>
