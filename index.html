<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zebra USB Print Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/zebra-browser-print-min@3.0.216/BrowserPrint-3.0.216.min.js"></script>

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      padding: 40px 20px; 
      display: flex;
      justify-content: center;
      background: #f8fafc; 
      color: #334155; 
      margin: 0;
    }
    .box { 
      border: 1px solid #e2e8f0; 
      padding: 50px; 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); 
      width: 100%;
      max-width: 750px; /* Increased from 500px */
      text-align: center;
      margin-top: 2vh;
    }
    h2 {
      margin-top: 0;
      color: #0f172a;
      font-size: 28px;
    }
    p.subtitle {
      color: #64748b;
      font-size: 16px;
      margin-bottom: 30px;
    }
    button { 
      padding: 16px 24px; /* Made the button chunkier */
      font-size: 18px; /* Larger text */
      background: #2563eb; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:active { 
      transform: scale(0.98);
    }
    #status { 
      font-weight: 600; 
      margin-top: 20px; 
      color: #64748b; 
      font-size: 15px; 
    }
    .log-header {
      text-align: left; 
      margin: 32px 0 10px 0; 
      color: #475569;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .log-box { 
      text-align: left; 
      background: #f1f5f9; 
      color: #334155; 
      font-family: "ui-monospace", "SFMono-Regular", Menlo, Monaco, Consolas, monospace; 
      padding: 20px; 
      border-radius: 8px; 
      height: 350px; /* Increased from 220px to show more lines */
      overflow-y: auto; 
      border: 1px solid #cbd5e1; 
    }
    .log-entry { 
      margin-bottom: 12px; 
      border-bottom: 1px solid #e2e8f0; 
      padding-bottom: 12px; 
      font-size: 14px; 
      line-height: 1.5;
    }
    .log-entry:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .log-time {
      color: #94a3b8;
      margin-right: 8px;
    }
    .log-error {
      color: #b91c1c;
      font-weight: 500;
    }
    .log-action {
      display: block;
      margin-top: 8px;
      padding: 10px;
      background: #fee2e2;
      border-radius: 4px;
      color: #991b1b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Zebra Print Terminal</h2>
  <p class="subtitle">Keep this tab open in the background to handle hardware integrations from your app.</p>

  <button id="connectBtn">🔌 Connect Physical Printer</button>
  <p id="status">Status: Disconnected (Simulation Mode)</p>
  
  <h4 class="log-header">Activity Log</h4>
  <div id="logBox" class="log-box">
    <div class="log-entry" style="color: #64748b;">> System ready. Awaiting data from scanner app...</div>
  </div>
</div>

<script>
// ============================================================================
// CONFIGURATION & STATE
// ============================================================================
const ALLOWED_ORIGIN = "*"; // Replace with your Google Apps Script URL

// Hardware State
let zebraDevice = null;
let browserPrinter = null;

// OS Environment Checks
const isWindows = navigator.userAgent.includes("Windows");
const isChromeOS = navigator.userAgent.includes("CrOS");

// DOM Elements
const els = {
  connectBtn: document.getElementById('connectBtn'),
  status: document.getElementById('status'),
  logBox: document.getElementById('logBox')
};

// ============================================================================
// UTILITIES
// ============================================================================
/**
 * Logs messages to the UI. 
 * @param {string} message - The main log message.
 * @param {string} type - 'info', 'success', or 'error'.
 * @param {string} actionAdvice - Specific troubleshooting instructions for errors.
 */
function logToScreen(message, type = 'info', actionAdvice = null) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  
  if (type === 'error') {
    entry.classList.add('log-error');
  } else if (type === 'success') {
    entry.style.color = '#15803d';
  }

  const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  
  let htmlContent = `<span class="log-time">[${timestamp}]</span> ${message}`;
  
  if (type === 'error' && actionAdvice) {
    htmlContent += `<span class="log-action">💡 <strong>Troubleshooting:</strong> ${actionAdvice}</span>`;
  }

  entry.innerHTML = htmlContent;
  els.logBox.appendChild(entry);
  els.logBox.scrollTop = els.logBox.scrollHeight;
}

// ============================================================================
// HARDWARE: PRINTER CONNECTION
// ============================================================================
async function connectPrinter() {
  try {
    logToScreen("🔍 Detecting platform...", "info");
    zebraDevice = null;
    browserPrinter = null;

    // PATH 1: Windows (Zebra Browser Print Local App)
    if (isWindows) {
      logToScreen("🪟 Windows detected → Checking for Browser Print app");
      if (window.BrowserPrint) {
        window.BrowserPrint.getDefaultDevice("printer", function(device) {
          if (!device) {
            logToScreen("❌ Zebra utility running, but no printer selected.", "error", "Open the Zebra Browser Print app in your system tray, right-click, and ensure a default printer is selected.");
            return;
          }
          browserPrinter = device;
          els.status.innerText = "Status: Windows (Browser Print Connected)";
          els.status.style.color = "#15803d";
          logToScreen("🖨️ Browser Print local client linked and ready", "success");
        }, function(err) {
          logToScreen(`❌ Failed to reach local Zebra service: ${err}`, "error", "Ensure the Zebra Browser Print application is installed, running in the background, and that you accepted the browser security prompt.");
        });
      } else {
        logToScreen("❌ BrowserPrint library failed to load.", "error", "Check your internet connection or script sources.");
      }
      return;
    }

    // PATH 2: Chromebook / Direct WebUSB
    if (isChromeOS || navigator.usb) {
      logToScreen("💻 WebUSB mode initiated");
      zebraDevice = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0A5F }] });
      logToScreen(`📦 Selected: ${zebraDevice.productName || "Zebra Printer"}`);

      await zebraDevice.open();
      if (!zebraDevice.configuration) await zebraDevice.selectConfiguration(1);
      await zebraDevice.claimInterface(0);

      els.status.innerText = "Status: WebUSB Connected";
      els.status.style.color = "#15803d";
      logToScreen("🔌 WebUSB direct connection established successfully", "success");
      return;
    }

    logToScreen("⚠️ Environment not supported for USB direct connections.", "error", "Try using Google Chrome or Edge on a device that supports WebUSB, or use Windows with Zebra Browser Print.");
  
  } catch (error) {
    let advice = "Check your USB cable. Ensure the printer is powered on.";
    if (error.message.includes("No device selected")) {
      advice = "You cancelled the selection prompt. Click connect and choose a printer to continue.";
    } else if (error.message.includes("access denied")) {
      advice = "Another tab or application might be using the printer. Close other software and try again.";
    }

    logToScreen(`❌ Connection dropped: ${error.message}`, "error", advice);
    zebraDevice = null;
  }
}

// ============================================================================
// EVENT LISTENERS (Cross-Window Communication)
// ============================================================================
els.connectBtn.addEventListener('click', connectPrinter);

window.addEventListener('message', async (event) => {
  if (ALLOWED_ORIGIN !== "*" && !event.origin.includes(ALLOWED_ORIGIN)) return;
  if (!event.data || event.data.type !== 'ZEBRA_PRINT_JOB') return;

  logToScreen(`📩 Print job intercepted: ${event.data.tag}`);

  const buildSuccessPayload = () => ({
    type: "PRINT_SUCCESS",
    tag: event.data.tag
  });

  try {
    const finalZpl = event.data.zpl;

    // 1. Windows Browser Print
    if (browserPrinter) {
      browserPrinter.send(finalZpl, function() {
        logToScreen("🖨️ Job pushed via local Browser Print client", "success");
        event.source.postMessage(buildSuccessPayload(), event.origin);
      }, function(err) {
        logToScreen(`❌ Browser Print error: ${err}`, "error", "Check if the printer is out of paper, paused, or turned off.");
        event.source.postMessage({ type: "PRINT_ERROR", error: err }, event.origin);
      });
      return;
    }

    // 2. Direct WebUSB
    if (zebraDevice) {
      const data = new TextEncoder().encode(finalZpl);
      await zebraDevice.transferOut(1, data); 
      logToScreen("🖨️ Raw data piped out via WebUSB successfully", "success");
      event.source.postMessage(buildSuccessPayload(), event.origin);
      return;
    }

    // 3. Fallback: Simulation Mode
    logToScreen("🖥️ Simulation Mode: Print logged successfully.", "info");
    
    const simPayload = buildSuccessPayload();
    simPayload.tag = simPayload.tag + " (Simulated)"; 
    
    event.source.postMessage(simPayload, event.origin);

  } catch (err) {
    logToScreen(`❌ Print processing failure: ${err.message}`, "error", "The connection to the printer was likely lost. Try clicking 'Connect Physical Printer' again.");
    event.source.postMessage({ type: "PRINT_ERROR", error: err.message }, event.origin);
  }
});
</script>

</body>
</html>
