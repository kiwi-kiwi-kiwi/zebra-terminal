<!DOCTYPE html>
<html>
<head>
  <title>Zebra USB Print Terminal</title>
  <style>
    body { font-family: sans-serif; padding: 30px; text-align: center; background: #f4f6f9; color: #333; }
    .box { border: 2px dashed #6f42c1; padding: 30px; background: white; display: inline-block; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 450px; }
    button { padding: 12px 24px; font-size: 16px; background: #6f42c1; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:active { background: #5a32a3; }
    #status { font-weight: bold; margin-top: 15px; color: #666; font-size: 14px; }

    .log-box { margin-top: 20px; text-align: left; background: #222; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 6px; height: 180px; overflow-y: auto; }
    .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; font-size: 12px; }
  </style>
</head>

<body>

<div class="box">
  <h2>Zebra Print Terminal</h2>

  <button id="connectBtn">🔌 Connect Printer</button>

  <p id="status">Status: Disconnected</p>

  <div id="logBox" class="log-box"></div>
</div>

<!-- Zebra Browser Print (Windows fallback) -->
<script src="http://localhost:9100/BrowserPrint-3.0.216.min.js"></script>

<script>
let zebraDevice = null;
let browserPrinter = null;

const logBox = document.getElementById("logBox");

function logToScreen(msg) {
  const div = document.createElement("div");
  div.className = "log-entry";
  div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logBox.appendChild(div);
  logBox.scrollTop = logBox.scrollHeight;
}

/* =========================
   1. TRY BROWSER PRINT FIRST
   ========================= */
function initBrowserPrint() {
  return new Promise((resolve) => {
    try {
      if (!window.BrowserPrint) {
        return resolve(false);
      }

      BrowserPrint.getDefaultDevice("printer", function(device) {
        if (!device) return resolve(false);

        browserPrinter = device;
        logToScreen("🖨️ Browser Print printer detected (Windows mode)");
        resolve(true);
      }, function() {
        resolve(false);
      });

    } catch (e) {
      resolve(false);
    }
  });
}

/* =========================
   2. WEBUSB FALLBACK
   ========================= */
async function initWebUSB() {
  try {
    if (!navigator.usb) {
      throw new Error("WebUSB not supported");
    }

    zebraDevice = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0A5F }]
    });

    await zebraDevice.open();

    if (!zebraDevice.configuration) {
      await zebraDevice.selectConfiguration(1);
    }

    await zebraDevice.claimInterface(0);

    logToScreen("🔌 WebUSB Zebra connected (Chromebook/USB mode)");
    return true;

  } catch (err) {
    logToScreen("❌ WebUSB failed: " + err.message);
    zebraDevice = null;
    return false;
  }
}

/* =========================
   CONNECT BUTTON
   ========================= */
document.getElementById("connectBtn").addEventListener("click", async () => {

  logToScreen("🔍 Connecting printer...");

  const browserOk = await initBrowserPrint();

  if (browserOk) {
    document.getElementById("status").innerText = "Status: Browser Print (Windows)";
    document.getElementById("status").style.color = "green";
    return;
  }

  const usbOk = await initWebUSB();

  if (usbOk) {
    document.getElementById("status").innerText = "Status: WebUSB Connected";
    document.getElementById("status").style.color = "green";
    return;
  }

  document.getElementById("status").innerText = "Status: No printer found";
  document.getElementById("status").style.color = "red";
});

/* =========================
   PRINT HANDLER
   ========================= */
window.addEventListener("message", async (event) => {

  if (!event.data || event.data.type !== "ZEBRA_PRINT_JOB") return;

  logToScreen("📩 Print job received: " + event.data.tag);

  try {

    /* ---- WINDOWS (Browser Print) ---- */
    if (browserPrinter) {

      browserPrinter.send(event.data.zpl, function() {
        logToScreen("🖨️ Browser Print success");

        event.source.postMessage({
          type: "PRINT_SUCCESS",
          tag: event.data.tag
        }, event.origin);

      }, function(err) {
        logToScreen("❌ Browser Print error: " + err);
      });

      return;
    }

    /* ---- CHROMEBOOK / WEBUSB ---- */
    if (zebraDevice) {

      const encoder = new TextEncoder();
      const data = encoder.encode(event.data.zpl);

      await zebraDevice.transferOut(1, data);

      logToScreen("🖨️ WebUSB print success");

      event.source.postMessage({
        type: "PRINT_SUCCESS",
        tag: event.data.tag
      }, event.origin);

      return;
    }

    /* ---- SIMULATION ---- */
    logToScreen("🖥️ No printer available, simulating");

    event.source.postMessage({
      type: "PRINT_SUCCESS",
      tag: event.data.tag + " (Simulated)"
    }, event.origin);

  } catch (err) {
    logToScreen("❌ Print error: " + err.message);

    event.source.postMessage({
      type: "PRINT_ERROR",
      error: err.message
    }, event.origin);
  }
});

</script>
</body>
</html>
