<!DOCTYPE html>
<html>
<head>
  <title>Zebra USB Print Terminal</title>
  
  <script src="https://cdn.jsdelivr.net/npm/zebra-browser-print-min@3.0.216/BrowserPrint-3.0.216.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 30px; text-align: center; background: #f4f6f9; color: #333; }
    .box { border: 2px dashed #6f42c1; padding: 30px; background: white; display: inline-block; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 450px; }
    button { padding: 12px 24px; font-size: 16px; background: #6f42c1; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:active { background: #5a32a3; }
    #status { font-weight: bold; margin-top: 15px; color: #666; font-size: 14px; }
    .log-box { margin-top: 20px; text-align: left; background: #222; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 6px; height: 180px; overflow-y: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; font-size: 12px; }
  </style>
</head>
<body>

<div class="box">
  <h2>Zebra USB Print Terminal</h2>
  <p>Keep this tab open in the background to handle printing from your scanner app.</p>

  <button id="connectBtn">🔌 Connect Physical Zebra Printer</button>
  <p id="status">Status: Disconnected (Running in Simulation Mode 🖥️)</p>
  <div style="background: #f8f9fa; padding: 15px; border-radius: 6px; margin: 15px 0; border: 1px solid #ddd;">
    <h3 style="margin:0; color:#555;">Live Weight</h3>
    <div id="weightDisplay" style="font-size: 32px; font-weight: bold; color: #6f42c1;">0.00 <small style="font-size: 16px;">kg</small></div>
    <button id="simWeightBtn" style="background:#555; padding: 5px 10px; font-size: 12px; margin-top: 10px;">Simulate Random Weight</button>
  </div>
  <h4 style="text-align: left; margin-bottom: 5px; color: #555;">Activity Log:</h4>
  <div id="logBox" class="log-box">
    <div class="log-entry" style="color: #888;">> System ready. Awaiting data from scanner app...</div>
  </div>
</div>

<script>

const weightDisplay = document.getElementById('weightDisplay');
const simWeightBtn = document.getElementById('simWeightBtn');

// This function acts as your "Scale Driver"
async function getWeightFromScale() {
  logToScreen("⚖️ Requesting weight from scale...");
  
  // SIMULATION: Wait 500ms to mimic hardware latency
  await new Promise(resolve => setTimeout(resolve, 500));
  
  // Simulate a weight between 0.5kg and 5.0kg
  const simulatedWeight = (Math.random() * 4.5 + 0.5).toFixed(3);
  
  logToScreen("✅ Received weight: " + simulatedWeight + " kg");
  weightDisplay.innerHTML = `${simulatedWeight} <small style="font-size: 16px;">kg</small>`;
  
  // Optional: Send this back to your Scanner app if needed
  if (window.opener) {
    window.opener.postMessage({ type: 'WEIGHT_UPDATE', weight: simulatedWeight }, '*');
  }
}

simWeightBtn.addEventListener('click', getWeightFromScale);
  
// Global printer states
let zebraDevice = null;
let browserPrinter = null;

const logBox = document.getElementById('logBox');
const statusEl = document.getElementById('status');

// Helper to push clean logs to the on-screen terminal
function logToScreen(message, isAlert = false) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  if (isAlert) entry.style.color = '#ffcc00';

  const timestamp = new Date().toLocaleTimeString();
  entry.innerHTML = `[${timestamp}] ${message}`;

  logBox.appendChild(entry);
  logBox.scrollTop = logBox.scrollHeight;
}

// Simple OS checks
const isWindows = navigator.userAgent.includes("Windows");
const isChromeOS = navigator.userAgent.includes("CrOS");

// Triggered when clicking "Connect"
document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    logToScreen("🔍 Detecting platform...");
    
    // Reset any existing connection states
    zebraDevice = null;
    browserPrinter = null;

    // PATH 1: Windows flow (Requires the Zebra Browser Print desktop app running locally)
    if (isWindows) {
      logToScreen("🪟 Windows detected → aiming for Browser Print app");

      if (window.BrowserPrint) {
        BrowserPrint.getDefaultDevice("printer", function(device) {
          if (!device) {
            logToScreen("❌ Zebra desktop utility is running, but no physical printer is selected or found in it.", true);
            return;
          }

          browserPrinter = device;
          statusEl.innerText = "Status: Windows (Browser Print Connected)";
          statusEl.style.color = "green";
          logToScreen("🖨️ Browser Print local client linked and ready");

        }, function(err) {
          logToScreen("❌ Failed to reach local Zebra service. Make sure the desktop app is running: " + err, true);
        });
      } else {
        logToScreen("❌ BrowserPrint script missing or failed to initialize.", true);
      }
      return;
    }

    // PATH 2: Chromebook / Direct WebUSB flow
    if (isChromeOS || navigator.usb) {
      logToScreen("💻 ChromeOS / WebUSB mode initiated");

      // Open browser prompt to pick a USB device (Zebra Vendor ID = 0x0A5F)
      zebraDevice = await navigator.usb.requestDevice({
        filters: [{ vendorId: 0x0A5F }]
      });

      logToScreen("📦 Selected: " + (zebraDevice.productName || "Zebra Printer"));

      await zebraDevice.open();
      
      if (!zebraDevice.configuration) {
        await zebraDevice.selectConfiguration(1);
      }
      
      await zebraDevice.claimInterface(0);

      statusEl.innerText = "Status: WebUSB Connected";
      statusEl.style.color = "green";
      logToScreen("🔌 WebUSB direct connection established successfully");
      return;
    }

    // Fallback if neither condition hits
    logToScreen("⚠️ Environment not supported for USB direct connections.", true);
    statusEl.innerText = "Status: No supported connection path";
    statusEl.style.color = "red";

  } catch (error) {
    console.error(error);
    logToScreen(`❌ Connection dropped: ${error.name} - ${error.message}`, true);
    statusEl.innerText = "Status: Connection failed";
    statusEl.style.color = "red";
    zebraDevice = null;
  }
});

// Listener for cross-window messages (e.g. from your scanner app)
window.addEventListener('message', async (event) => {
  if (!event.data || event.data.type !== 'ZEBRA_PRINT_JOB') return;

  logToScreen("📩 Print job intercepted: " + event.data.tag);

  try {
    // Execute print via Windows Browser Print local app
    if (browserPrinter) {
      browserPrinter.send(event.data.zpl, function() {
        logToScreen("🖨️ Job pushed via local Browser Print client");
        
        event.source.postMessage({
          type: "PRINT_SUCCESS",
          tag: event.data.tag
        }, event.origin);
        
      }, function(err) {
        logToScreen("❌ Browser Print error during transfer: " + err, true);
      });
      return;
    }

    // Execute print via direct WebUSB
    if (zebraDevice) {
      const data = new TextEncoder().encode(event.data.zpl);
      
      // Bulk endpoint 1 is standard for most Zebra USB endpoints
      await zebraDevice.transferOut(1, data); 
      logToScreen("🖨️ Raw data piped out via WebUSB successfully");

      event.source.postMessage({
        type: "PRINT_SUCCESS",
        tag: event.data.tag
      }, event.origin);
      return;
    }

    // Simulation mode fallback if no printer is connected yet
    logToScreen("🖥️ Simulation Mode active: Print job logged but not sent to physical hardware");
    
    event.source.postMessage({
      type: "PRINT_SUCCESS",
      tag: event.data.tag + " (Simulated)"
    }, event.origin);

  } catch (err) {
    logToScreen("❌ Print processing failure: " + err.message, true);
    
    event.source.postMessage({
      type: "PRINT_ERROR",
      error: err.message
    }, event.origin);
  }
});
</script>

</body>
</html>
